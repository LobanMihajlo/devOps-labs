services:
  db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: mywebappdb
      POSTGRES_USER: mywebapp
      POSTGRES_PASSWORD: mywebapp
    volumes:
      - ./pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U mywebapp -d mywebappdb"]
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 10s
    networks:
      - mywebapp-net

  app:
    build:
      context: ./mywebapp
    restart: unless-stopped
    environment:
      NODE_ENV: production
    command: sh -c "node src/migrations/migrate.js && node src/app.js"
    depends_on:
      db:
        condition: service_healthy
    networks:
      - mywebapp-net

  nginx:
    image: nginx:alpine
    restart: unless-stopped
    depends_on:
      - app
    ports:
      - "80:80"
    volumes:
      - ./nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
    networks:
      - mywebapp-net

networks:
  mywebapp-net:
    driver: bridge